version: '3.8'
services:
  mongo:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo-data:/data/db]
    restart: unless-stopped

  backend:
    build: ./backend
    ports: ["5000:5000"]
    environment:
      - MONGO_URI=mongodb://mongo:27017/love-coin-xxx-pool
      - JWT_SECRET=super-secret-love-coin-xxx-moon-key-2026
      - NOWPAYMENTS_API_KEY=your_nowpayments_key_here
      - LOVENFT_ADDRESS=your_deployed_nft_address_here
      - BACKEND_WALLET_PRIVATE_KEY=your_backend_wallet_key_here
    depends_on: [mongo]
    restart: unless-stopped

volumes:
  mongo-data:
